  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-black: #030305;
      --bg-card: rgba(10, 10, 18, 0.6);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary: #00ffcc; /* Alight Motion Green */
      --secondary: #8a2be2; /* Neon Purple */
      --accent: #ff007f; /* Cyber Pink */
      --text-main: #f5f5f7;
      --text-muted: #8e8e9f;
      --font-syne: 'Syne', sans-serif;
      --font-space: 'Space Grotesk', sans-serif;
      --glow-primary: 0 0 20px rgba(0, 255, 204, 0.4);
      --glow-secondary: 0 0 20px rgba(138, 43, 226, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      cursor: default;
    }

    html {
      scroll-behavior: smooth;
      background-color: var(--bg-black);
      color: var(--text-main);
      font-family: var(--font-space);
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-black);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--secondary);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    /* Background Grid & Lights */
    .bg-viewport {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      background: 
        radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 255, 204, 0.12) 0%, transparent 40%),
        linear-gradient(to bottom, #030305, #080810);
      overflow: hidden;
    }

    .bg-grid {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: perspective(500px) rotateX(60deg);
      animation: gridScroll 40s linear infinite;
      opacity: 0.7;
    }

    @keyframes gridScroll {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }

    /* ThreeJS Canvas Container */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
    }

    /* Header / Navigation */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 25px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
    }

    .logo {
      font-family: var(--font-syne);
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
      display: inline-block;
      animation: pulse 2s infinite;
    }

    nav {
      display: flex;
      gap: 30px;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      position: relative;
      cursor: pointer;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width 0.3s ease;
    }

    nav a:hover {
      color: var(--primary);
      text-shadow: var(--glow-primary);
    }

    nav a:hover::after {
      width: 100%;
    }

    .cta-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-family: var(--font-space);
      transition: all 0.3s ease;
      box-shadow: var(--glow-primary);
    }

    .cta-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 0 25px var(--secondary);
      color: #fff;
    }

    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 0 8%;
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      max-width: 650px;
      z-index: 2;
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .badge {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--primary);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 25px;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.05);
    }

    .badge i {
      animation: spin 4s linear infinite;
    }

    .hero-title {
      font-family: var(--font-syne);
      font-size: 4.5rem;
      line-height: 1.1;
      font-weight: 800;
      margin-bottom: 20px;
      letter-spacing: -2px;
    }

    .hero-title span {
      background: linear-gradient(to right, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-title .highlight {
      background: linear-gradient(135deg, var(--primary) 30%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: block;
    }

    .hero-desc {
      font-size: 1.15rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 35px;
    }

    .hero-actions {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 12px 28px;
      border-radius: 30px;
      font-family: var(--font-space);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--primary);
      box-shadow: var(--glow-primary);
    }

    /* Floating 3D Elements (CSS Fallback for ThreeJS) */
    .floating-viewport {
      position: absolute;
      right: 8%;
      width: 450px;
      height: 450px;
      border-radius: 24px;
      background: radial-gradient(circle, rgba(138, 43, 226, 0.1) 0%, transparent 70%);
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotateY(-20deg) rotateX(15deg);
      transform-style: preserve-3d;
      animation: float3D 6s ease-in-out infinite alternate;
      box-shadow: 0 30px 50px rgba(0,0,0,0.5);
    }

    @keyframes float3D {
      0% { transform: rotateY(-20deg) rotateX(15deg) translateY(0px); }
      100% { transform: rotateY(-10deg) rotateX(25deg) translateY(-20px); }
    }

    /* SVG Storytelling Animation (Alight Motion Timeline Concept) */
    .motion-svg {
      width: 85%;
      height: 85%;
    }

    .svg-track {
      stroke: var(--border-color);
      stroke-dasharray: 5, 5;
    }

    .svg-node {
      fill: var(--secondary);
      filter: drop-shadow(0 0 8px var(--secondary));
      animation: pulseNode 3s infinite alternate;
    }

    .svg-node-active {
      fill: var(--primary);
      filter: drop-shadow(0 0 12px var(--primary));
      animation: pulseNodeActive 2s infinite alternate;
    }

    .svg-curve {
      stroke: url(#grad-cyan-purple);
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawCurve 5s ease-in-out infinite;
    }

    @keyframes drawCurve {
      to { stroke-dashoffset: 0; }
    }

    @keyframes pulseNode {
      0% { r: 6; opacity: 0.6; }
      100% { r: 10; opacity: 1; }
    }

    @keyframes pulseNodeActive {
      0% { r: 8; filter: drop-shadow(0 0 5px var(--primary)); }
      100% { r: 14; filter: drop-shadow(0 0 15px var(--primary)); }
    }

    /* Story / About Section */
    .about {
      padding: 120px 8%;
      position: relative;
    }

    .section-header {
      text-align: center;
      margin-bottom: 80px;
    }

    .section-tag {
      color: var(--accent);
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 2px;
      font-weight: 600;
      margin-bottom: 10px;
      display: block;
    }

    .section-title {
      font-family: var(--font-syne);
      font-size: 3rem;
      font-weight: 800;
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 60px;
      align-items: center;
    }

    .about-text {
      font-size: 1.1rem;
      color: var(--text-muted);
      line-height: 1.8;
    }

    .about-text p {
      margin-bottom: 25px;
    }

    .highlight-text {
      color: var(--text-main);
      font-weight: 600;
      border-left: 3px solid var(--primary);
      padding-left: 15px;
    }

    .tech-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 35px;
    }

    .tech-badge {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .tech-badge:hover {
      border-color: var(--secondary);
      background: rgba(138, 43, 226, 0.05);
      transform: translateY(-3px);
    }

    .tech-badge i {
      color: var(--primary);
    }

    /* Interactive Timeline SVG Graphic */
    .timeline-graphic {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      box-shadow: inset 0 0 30px rgba(255,255,255,0.02);
    }

    /* Recent Projects Section */
    .projects {
      padding: 120px 8%;
      background: linear-gradient(to bottom, transparent, rgba(5, 5, 8, 0.6));
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 30px;
      margin-top: 50px;
    }

    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .project-card:hover {
      transform: translateY(-10px) rotateX(5deg) rotateY(2deg);
      border-color: var(--primary);
      box-shadow: 0 15px 35px rgba(0, 255, 204, 0.1);
    }

    .project-thumbnail {
      width: 100%;
      height: 200px;
      background: #12121a;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Mockup Video Editing Interface inside Thumbnail */
    .video-mockup {
      width: 90%;
      height: 80%;
      border-radius: 8px;
      background: #08080c;
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .mockup-timeline {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30px;
      background: #12121a;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 5px;
    }

    .mockup-track {
      height: 6px;
      background: var(--secondary);
      border-radius: 3px;
      flex-grow: 1;
    }

    .mockup-track.active {
      background: var(--primary);
      width: 40%;
    }

    .mockup-playhead {
      position: absolute;
      top: 0;
      left: 45%;
      width: 2px;
      height: 100%;
      background: var(--accent);
    }

    .project-info {
      padding: 25px;
    }

    .project-tag {
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: block;
    }

    .project-title {
      font-family: var(--font-syne);
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .project-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .project-links {
      display: flex;
      gap: 15px;
    }

    .btn-project {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 10px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }

    .btn-project:hover {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
      box-shadow: var(--glow-primary);
    }

    /* Admin Upload Section (Mockup for Drive Links) */
    .admin-portal {
      padding: 100px 8%;
      background: radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.05) 0%, transparent 70%);
    }

    .admin-card {
      background: linear-gradient(135deg, rgba(15, 15, 25, 0.8) 0%, rgba(5, 5, 10, 0.8) 100%);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 50px;
      max-width: 900px;
      margin: 0 auto;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .admin-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 20px;
    }

    .admin-icon {
      width: 50px;
      height: 50px;
      background: rgba(0, 255, 204, 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 1.5rem;
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    label {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input, select, textarea {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      padding: 14px 18px;
      border-radius: 12px;
      color: var(--text-main);
      font-family: var(--font-space);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: var(--glow-primary);
      background: rgba(255, 255, 255, 0.04);
    }

    .btn-upload {
      grid-column: span 2;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000;
      font-weight: 600;
      padding: 16px;

      border: none;
      cursor: pointer;
      font-family: var(--font-space);

      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 15px;
    }

  // Ambient Light
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);

  pointLight.position.set(5, 5, 5);
  scene.add(pointLight);

  // Floating 3D Model (GLTF)
  let model;
  const loader = new THREE.GLTFLoader();
  loader.load('https://example.com/model.gltf', (gltf) => {
    model = gltf.scene;
    model.position.set(0, 0, 0);
    model.scale.set(0.5, 0.5, 0.5);
    scene.add(model);
  });

  // Animation Loop
  function animate() {
    requestAnimationFrame(animate);
    if (model) {
      model.rotation.y += 0.01;
    }
    renderer.render(scene, camera);
  }
  animate();

  // Hero Section Animation

    heroDesc.classList.add('animate-desc');
  }, 1000);

  // SVG Storytelling Animation
  const svgCurve = document.querySelector('.svg-curve');

  });
  projectGrid.addEventListener('mouseout', (e) => {

  });

      method: 'POST',
      body: formData
    })
    .then((res) => res.json())
    .then((data) => console.log(data))
    .catch((err) => console.error(err));
  });

  });
